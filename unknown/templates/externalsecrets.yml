---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: gcp-secret-manager
spec:
  provider:
    gcpsm:
      projectID: <GCP_PROJECT_ID>
      auth:
        workloadIdentity:
          clusterLocation: <CLUSTER_REGION>
          clusterName: <GKE_CLUSTER_NAME>
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-feature-flags
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: gcp-secret-manager
    kind: SecretStore
  target:
    name: app-feature-flags-secret
    creationPolicy: Owner
  data:
    - secretKey: NEW_FEATURE_ENABLED
      remoteRef:
        key: feature-flags-node-app
        property: NEW_FEATURE_ENABLED
        version: latest
``
